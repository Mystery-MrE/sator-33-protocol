<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATOR-33 Sovereign Vault // Active Retrieval</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .vault-card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 12px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-bottom: 60px; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #58a6ff; font-weight: bold; letter-spacing: 1px; }
        .subtitle { font-size: 11px; color: #8b949e; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .file-box { border: 2px dashed #30363d; padding: 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; display: block; }
        .file-box:hover { border-color: #58a6ff; background: #21262d; }
        input[type="file"], input[type="number"] { display: none; }
        .astro-input-group { background: #21262d; border: 1px solid #30363d; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        .astro-input-group label { font-size: 12px; color: #58a6ff; font-weight: bold; display: block; margin-bottom: 8px; }
        .astro-field { background: #0d1117; border: 1px solid #30363d; color: #ffffff; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 6px; font-family: monospace; font-size: 14px; margin-bottom: 10px; }
        button { background: #238636; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 15px; transition: 0.2s; }
        button:hover { background: #2ea043; }
        
        /* Expanded Mobile Retrieval Container Layout */
        .retrieve-section { background: #21262d; border: 1px solid #30363d; padding: 35px 25px !important; border-radius: 8px; margin-top: 30px !important; text-align: left; display: none; min-height: 180px !important; }
        #status { margin-top: 15px; font-size: 13px; color: #7ee787; font-family: monospace; white-space: pre-wrap; text-align: left; border-left: 2px solid #30363d; padding-left: 10px; min-height: 40px; }
        
        .field-label { color: #58a6ff; font-size: 12px; font-weight: bold; display: block; margin-bottom: 6px; margin-top: 12px; text-transform: uppercase; }
        .identity-input-field { background: #0d1117 !important; border: 1px solid #58a6ff !important; color: #ffffff !important; padding: 14px !important; width: 100% !important; box-sizing: border-box !important; border-radius: 6px !important; margin-bottom: 20px !important; font-family: monospace !important; font-size: 16px !important; display: block !important; }
        .retrieve-btn { background: #1f6feb; }
        .retrieve-btn:hover { background: #388bfd; }
    </style>
</head>
<body>

<div class="vault-card">
    <h1>SATOR-33 VAULT</h1>
    <div class="subtitle">Astro-Riches Symmetrical Alignment // 1 + 1 = 2</div>
    
    <div class="astro-input-group">
        <label>✨ Align Natal Wealth Vector coordinates</label>
        <input type="number" id="ascendant-degree" class="astro-field" placeholder="Ascendant Degree (0-359)" style="display:block;">
        <input type="number" id="jupiter-degree" class="astro-field" placeholder="Jupiter Degree (0-359)" style="display:block; margin-bottom:0;">
    </div>

    <label class="file-box" id="drop-zone">
        <input type="file" id="file-input">
        <span id="box-text">Select Asset Payload File</span>
    </label>

    <button id="process-btn">Lock Matrix with Astro-Riches Key</button>
    <div id="status">System Status: Awaiting Vector Alignment...</div>

    <!-- Heavily Spaced and Padded Active Retrieval Gateway Interface -->
    <div class="retrieve-section" id="retrieve-panel">
        <b style="color: #58a6ff; font-size: 14px;">🔑 S33 Cryptographic Retrieval Portal</b>
        <div style="margin-top: 8px; color: #8b949e; font-size: 12px; line-height: 1.4;">The celestial matrix is locked. Reversing vectors requires identity phrase clearance.</div>
        
        <label class="field-label">Verification Key</label>
        
        
        <button class="retrieve-btn" id="download-btn">Decrypt & Retrieve File</button>
    </div>
</div>

<script>
    let activeFileBlob = null;
    let activeFileName = "";
    let calculatedAstroKey = 0;

    document.getElementById('file-input').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            activeFileName = file.name;
            activeFileBlob = file;
            document.getElementById('box-text').innerText = `Loaded: ${file.name}`;
        }
    });

    document.getElementById('process-btn').addEventListener('click', () => {
        const statusDiv = document.getElementById('status');
        const asc = parseFloat(document.getElementById('ascendant-degree').value);
        const jup = parseFloat(document.getElementById('jupiter-degree').value);
        
        if (isNaN(asc) || isNaN(jup) || asc < 0 || asc > 359 || jup < 0 || jup > 359) {
            statusDiv.style.color = "#f85149";
            statusDiv.innerText = "Error: Input valid Natal Degrees (0-359) to align vectors.";
            return;
        }

        if (!activeFileBlob) {
            statusDiv.style.color = "#f85149";
            statusDiv.innerText = "Error: Input data asset file missing.";
            return;
        }

        calculatedAstroKey = ((asc + jup) / 7).toFixed(4);

        statusDiv.style.color = "#7ee787";
        statusDiv.innerText = `⚙️ Ingesting values... Calculating Astro-Riches Vector: ${calculatedAstroKey}°\n`;
        
        setTimeout(() => {
            statusDiv.innerText += "📐 Processing 5x5 multi-vector geometric SATOR validation...\n";
        }, 800);

        setTimeout(() => {
            statusDiv.innerText += "🔒 Locking file inside Key-33 boundaries via celestial coordinates...\n";
        }, 1600);

        setTimeout(() => {
            statusDiv.innerText += `✓ SUCCESS: Matrix Engaged. File is secure.`;
            document.getElementById('retrieve-panel').style.display = "block";
            // Forces mobile screen view to pull upward dynamically
            document.getElementById('retrieve-panel').scrollIntoView({ behavior: 'smooth' });
        }, 2400);
    });

    document.getElementById('download-btn').addEventListener('click', () => {
        const identityKey = document.getElementById('identity-input').value.trim();
        const statusDiv = document.getElementById('status');

        if (identityKey !== "I AM HIM") {
            statusDiv.style.color = "#f85149";
            statusDiv.innerText = "CRITICAL SECURITY REFUSAL: Identity Signature Invalidation.\nMatrix locked. Access Denied.";
            return;
        }

        statusDiv.style.color = "#58a6ff";
        statusDiv.innerText = `🔄 Processing reverse vectors using key frequency ${calculatedAstroKey}...\nReassembling data fragments from the lattice...`;

        setTimeout(() => {
            statusDiv.style.color = "#7ee787";
            statusDiv.innerText = "✓ Verification Perfect. Matrix alignment stable.\nSaving asset stream back to device memory...";
            
            const url = URL.createObjectURL(activeFileBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = activeFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 1800);
    });
</script>

</body>
</html>
